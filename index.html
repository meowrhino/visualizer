<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Crea capturas de pantalla con browser frames para tu portfolio e Instagram">
  <title>visualizer — browser frame screenshots</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="icon" href="favicon/favicon.ico">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/controls.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
  <main>
    <section class="controls">
      <div class="control-row source-row">
        <label>fuente</label>
        <div class="source-controls">
          <div class="meta-url-row">
            <input type="url" id="url-input" placeholder="url para titulo y favicon (opcional)" autocomplete="off">
            <button id="load-meta-btn" class="btn-secondary btn-sm">cargar info</button>
          </div>
          <div class="drop-zone" id="drop-zone">
            <span class="drop-zone-text">pega una captura <kbd>Cmd+V</kbd> o arrastra imágenes</span>
            <input type="file" id="file-input" accept="image/*" multiple hidden>
          </div>
          <span class="file-name" id="file-name"></span>
        </div>
      </div>

      <div class="control-row bottom-row">
        <div class="left-controls">
          <label class="check-label">
            <input type="checkbox" id="shadow-toggle" checked>
            sombra
          </label>
          <div class="format-controls">
            <div class="toggle-group">
              <button class="toggle-btn format-btn" data-format="png">PNG</button>
              <button class="toggle-btn format-btn active" data-format="webp">WebP</button>
            </div>
            <select id="quality-select">
              <option value="0.70">70%</option>
              <option value="0.80">80%</option>
              <option value="0.85" selected>85%</option>
              <option value="0.90">90%</option>
              <option value="0.95">95%</option>
              <option value="1.00">100%</option>
            </select>
          </div>
        </div>
        <span class="download-hint" id="download-hint" hidden></span>
      </div>
    </section>

    <!-- Results grid -->
    <section class="results" id="results" hidden>
      <div class="results-header">
        <span class="results-count" id="results-count"></span>
        <button class="btn-primary btn-sm" id="download-all-btn">descargar todo (.zip)</button>
      </div>
      <div class="results-grid" id="results-grid"></div>
    </section>
  </main>

  <footer>
    <a href="https://meowrhino.studio" target="_blank" rel="noopener">meowrhino.studio</a>
  </footer>

  <canvas id="export-canvas" hidden></canvas>
  <script type="module" src="js/main.js"></script>
</body>
</html>
